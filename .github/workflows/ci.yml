name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: analyze · test · build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        # --pwa-strategy=none: no service worker, so deploys go live on the
        # next reload instead of lagging one visit behind a cache-first SW.
        run: flutter build web --pwa-strategy=none
